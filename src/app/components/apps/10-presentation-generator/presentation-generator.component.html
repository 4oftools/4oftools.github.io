<app-app-detail [app]="app" [useAsLayout]="true" *ngIf="app">
  <section class="content-section">
    <h2>简介</h2>
    <p>演示文稿生成器类似 PPT 工具，但更强大：支持动态内容、动画效果与数据驱动排版，可从数据源自动更新图表与文本，适合汇报、路演与在线演示。</p>
    <figure class="figure-block">
      <img src="/assets/apps/10-presentation-generator/overview.png" alt="演示文稿生成器概览" (error)="onImageError($event)" />
      <div class="image-placeholder">
        <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
        <p>此处放置「概览」截图</p>
        <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/10-presentation-generator/overview.png</code></p>
      </div>
    </figure>
  </section>
  <section class="content-section">
    <h2>功能特性</h2>
    <p>幻灯片编辑与模板、动态绑定（数据驱动图表/文本）、动画与转场、导出为 PDF/视频或在线演示等（可根据实际功能补充）。</p>
    <figure class="figure-block">
      <img src="/assets/apps/10-presentation-generator/features.png" alt="演示文稿生成器功能" (error)="onImageError($event)" />
      <div class="image-placeholder">
        <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
        <p>此处放置「功能」截图</p>
        <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/10-presentation-generator/features.png</code></p>
      </div>
    </figure>
  </section>
</app-app-detail>
<div class="app-detail app-loading" *ngIf="!app && !error">
  <div class="app-container">
    <p>{{ t('loading') }}</p>
  </div>
</div>
<div class="app-detail app-error" *ngIf="error">
  <div class="app-container">
    <p>{{ t('app.notfound') }}</p>
    <a routerLink="/apps" class="app-btn">{{ t('tool.back.to.list') }}</a>
  </div>
</div>
