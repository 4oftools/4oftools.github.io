<app-app-detail [app]="app" [useAsLayout]="true" *ngIf="app">
  <section class="content-section">
    <h2>简介</h2>
    <p>视频翻译器（video_translator）可为视频自动生成字幕并进行多语言翻译，适合外语学习、内容本地化与无障碍访问。</p>
    <figure class="figure-block">
      <img src="/assets/apps/04-video-translator/overview.png" alt="视频翻译器概览" (error)="onImageError($event)" />
      <div class="image-placeholder">
        <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
        <p>此处放置「概览」截图</p>
        <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/04-video-translator/overview.png</code></p>
      </div>
    </figure>
  </section>
  <section class="content-section">
    <h2>功能特性</h2>
    <p>语音识别生成字幕、多语言翻译、字幕导出与时间轴编辑等（可根据实际功能补充）。</p>
    <figure class="figure-block">
      <img src="/assets/apps/04-video-translator/features.png" alt="视频翻译器功能" (error)="onImageError($event)" />
      <div class="image-placeholder">
        <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
        <p>此处放置「功能」截图</p>
        <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/04-video-translator/features.png</code></p>
      </div>
    </figure>
  </section>
</app-app-detail>
<div class="app-detail app-loading" *ngIf="!app && !error">
  <div class="app-container">
    <p>{{ t('loading') }}</p>
  </div>
</div>
<div class="app-detail app-error" *ngIf="error">
  <div class="app-container">
    <p>{{ t('app.notfound') }}</p>
    <a routerLink="/apps" class="app-btn">{{ t('tool.back.to.list') }}</a>
  </div>
</div>
