<div class="mnemora-page">
  <div class="container">
    <div class="breadcrumb">
      <a routerLink="/">{{ t('site.name') }}</a>
      <span class="separator">/</span>
      <a routerLink="/apps">{{ t('nav.apps') }}</a>
      <span class="separator">/</span>
      <span *ngIf="app">{{ getAppName(app) }}</span>
    </div>

    <header class="app-header" *ngIf="app">
      <div class="app-header-icon" [ngClass]="'tool-icon--' + (app.iconColor || 'app')">
        <app-icon [icon]="app.icon || 'mdi:cellphone'" size="56px"></app-icon>
      </div>
      <div class="app-header-text">
        <h1 class="app-title">{{ getAppName(app) }}</h1>
        <p class="app-subtitle">{{ getAppDescription(app) }}</p>
        <div class="app-tags" *ngIf="getAppTags(app).length">
          <span class="tag" *ngFor="let tag of getAppTags(app)">{{ tag }}</span>
        </div>
      </div>
    </header>

    <div class="app-body">
      <section class="content-section">
        <h2>简介</h2>
        <p>Mnemora 是一款文档与 Wiki 项目，支持知识库搭建、多人协作编辑与版本管理，适合团队文档、产品说明与知识沉淀。</p>
        <figure class="figure-block">
          <img src="/assets/apps/08-mnemora/overview.png" alt="Mnemora 概览" (error)="onImageError($event)" />
          <div class="image-placeholder">
            <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
            <p>此处放置「概览」截图</p>
            <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/08-mnemora/overview.png</code></p>
          </div>
        </figure>
      </section>

      <section class="content-section">
        <h2>功能特性</h2>
        <p>富文本/Markdown 编辑、目录与链接、权限与协作、版本历史与回滚等（可根据实际功能补充）。</p>
        <figure class="figure-block">
          <img src="/assets/apps/08-mnemora/features.png" alt="Mnemora 功能" (error)="onImageError($event)" />
          <div class="image-placeholder">
            <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
            <p>此处放置「功能」截图</p>
            <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/08-mnemora/features.png</code></p>
          </div>
        </figure>
      </section>

      <div class="back-actions">
        <a routerLink="/apps" class="btn btn-secondary">
          {{ t('tool.back.to.list') }}
        </a>
      </div>
    </div>
  </div>
</div>
