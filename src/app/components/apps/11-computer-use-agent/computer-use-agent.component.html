<app-app-detail [app]="app" [useAsLayout]="true" *ngIf="app">
  <section class="content-section">
    <h2>简介</h2>
    <p>ComputerUseAgent 是一种可操作电脑的 AI 智能体，通过自然语言指令执行点击、输入、浏览等自动化任务，适合重复性操作、流程编排与人机协作。</p>
    <figure class="figure-block">
      <img src="/assets/apps/11-computer-use-agent/overview.png" alt="ComputerUseAgent 概览" (error)="onImageError($event)" />
      <div class="image-placeholder">
        <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
        <p>此处放置「概览」截图</p>
        <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/11-computer-use-agent/overview.png</code></p>
      </div>
    </figure>
  </section>
  <section class="content-section">
    <h2>功能特性</h2>
    <p>自然语言指令、屏幕理解与点击/输入、多步骤任务编排、安全与权限控制等（可根据实际功能补充）。</p>
    <figure class="figure-block">
      <img src="/assets/apps/11-computer-use-agent/features.png" alt="ComputerUseAgent 功能" (error)="onImageError($event)" />
      <div class="image-placeholder">
        <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
        <p>此处放置「功能」截图</p>
        <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/11-computer-use-agent/features.png</code></p>
      </div>
    </figure>
  </section>
</app-app-detail>
<div class="app-detail app-loading" *ngIf="!app && !error">
  <div class="app-container">
    <p>{{ t('loading') }}</p>
  </div>
</div>
<div class="app-detail app-error" *ngIf="error">
  <div class="app-container">
    <p>{{ t('app.notfound') }}</p>
    <a routerLink="/apps" class="app-btn">{{ t('tool.back.to.list') }}</a>
  </div>
</div>
