<div class="architecture-design-page">
  <div class="container">
    <div class="breadcrumb">
      <a routerLink="/">{{ t('site.name') }}</a>
      <span class="separator">/</span>
      <a routerLink="/apps">{{ t('nav.apps') }}</a>
      <span class="separator">/</span>
      <span *ngIf="app">{{ getAppName(app) }}</span>
    </div>

    <header class="app-header" *ngIf="app">
      <div class="app-header-icon" [ngClass]="'tool-icon--' + (app.iconColor || 'app')">
        <app-icon [icon]="app.icon || 'mdi:cellphone'" size="56px"></app-icon>
      </div>
      <div class="app-header-text">
        <h1 class="app-title">{{ getAppName(app) }}</h1>
        <p class="app-subtitle">{{ getAppDescription(app) }}</p>
        <div class="app-tags" *ngIf="getAppTags(app).length">
          <span class="tag" *ngFor="let tag of getAppTags(app)">{{ tag }}</span>
        </div>
      </div>
    </header>

    <div class="app-body">
      <section class="content-section">
        <h2>概述</h2>
        <p>本页整理软件架构设计中的常见思路与图示，包括分层架构、模块划分、领域驱动设计（DDD）等，便于在项目中选型与沟通。下文将用图示与截图展示。</p>
        <figure class="figure-block">
          <img src="/assets/apps/02-architecture-design/overview.png" alt="架构设计概述图示" (error)="onImageError($event)" />
          <div class="image-placeholder">
            <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
            <p>此处放置「概述」图示</p>
            <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/02-architecture-design/overview.png</code></p>
          </div>
        </figure>
      </section>

      <section class="content-section">
        <h2>分层与模块</h2>
        <p>（可补充分层架构、模块化拆分的说明与示意图。）</p>
        <figure class="figure-block">
          <img src="/assets/apps/02-architecture-design/layers.png" alt="分层与模块图示" (error)="onImageError($event)" />
          <div class="image-placeholder">
            <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
            <p>此处放置「分层与模块」图示</p>
            <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/02-architecture-design/layers.png</code></p>
          </div>
        </figure>
      </section>

      <section class="content-section">
        <h2>实践示例</h2>
        <p>（可补充具体项目的架构图或实践案例截图。）</p>
        <figure class="figure-block">
          <img src="/assets/apps/02-architecture-design/practice.png" alt="实践示例图示" (error)="onImageError($event)" />
          <div class="image-placeholder">
            <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
            <p>此处放置「实践示例」图示</p>
            <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/02-architecture-design/practice.png</code></p>
          </div>
        </figure>
      </section>

      <div class="back-actions">
        <a routerLink="/apps" class="btn btn-secondary">
          {{ t('tool.back.to.list') }}
        </a>
      </div>
    </div>
  </div>
</div>
