<app-app-detail [app]="app" [useAsLayout]="true" *ngIf="app">
  <section class="content-section">
    <h2>简介</h2>
    <p>UpWord 是一款面向日语学习的背单词软件，支持词汇记忆、复习计划与学习进度管理，帮助系统化积累日语词汇。</p>
    <figure class="figure-block">
      <img src="/assets/apps/05-upword/overview.png" alt="UpWord 概览" (error)="onImageError($event)" />
      <div class="image-placeholder">
        <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
        <p>此处放置「概览」截图</p>
        <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/05-upword/overview.png</code></p>
      </div>
    </figure>
  </section>
  <section class="content-section">
    <h2>功能特性</h2>
    <p>词库管理、记忆与复习（如艾宾浩斯曲线）、学习统计与进度追踪等（可根据实际功能补充）。</p>
    <figure class="figure-block">
      <img src="/assets/apps/05-upword/features.png" alt="UpWord 功能" (error)="onImageError($event)" />
      <div class="image-placeholder">
        <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
        <p>此处放置「功能」截图</p>
        <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/05-upword/features.png</code></p>
      </div>
    </figure>
  </section>
</app-app-detail>
<div class="app-detail app-loading" *ngIf="!app && !error">
  <div class="app-container">
    <p>{{ t('loading') }}</p>
  </div>
</div>
<div class="app-detail app-error" *ngIf="error">
  <div class="app-container">
    <p>{{ t('app.notfound') }}</p>
    <a routerLink="/apps" class="app-btn">{{ t('tool.back.to.list') }}</a>
  </div>
</div>
