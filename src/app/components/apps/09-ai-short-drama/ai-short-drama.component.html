<app-app-detail [app]="app" [useAsLayout]="true" *ngIf="app">
  <section class="content-section">
    <h2>简介</h2>
    <p>AI视频短剧是基于 AI 生成的视频短剧项目，支持从剧本创作、分镜到成片的一体化制作，适合短视频、竖屏短剧等场景。</p>
    <figure class="figure-block">
      <img src="/assets/apps/09-ai-short-drama/overview.png" alt="AI视频短剧概览" (error)="onImageError($event)" />
      <div class="image-placeholder">
        <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
        <p>此处放置「概览」截图</p>
        <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/09-ai-short-drama/overview.png</code></p>
      </div>
    </figure>
  </section>
  <section class="content-section">
    <h2>功能特性</h2>
    <p>剧本与分镜、AI 画面/语音生成、剪辑与导出等（可根据实际功能补充）。</p>
    <figure class="figure-block">
      <img src="/assets/apps/09-ai-short-drama/features.png" alt="AI视频短剧功能" (error)="onImageError($event)" />
      <div class="image-placeholder">
        <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
        <p>此处放置「功能」截图</p>
        <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/09-ai-short-drama/features.png</code></p>
      </div>
    </figure>
  </section>
</app-app-detail>
<div class="app-detail app-loading" *ngIf="!app && !error">
  <div class="app-container">
    <p>{{ t('loading') }}</p>
  </div>
</div>
<div class="app-detail app-error" *ngIf="error">
  <div class="app-container">
    <p>{{ t('app.notfound') }}</p>
    <a routerLink="/apps" class="app-btn">{{ t('tool.back.to.list') }}</a>
  </div>
</div>
