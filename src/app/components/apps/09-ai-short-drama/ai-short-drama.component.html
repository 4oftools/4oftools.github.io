<div class="ai-short-drama-page">
  <div class="container">
    <div class="breadcrumb">
      <a routerLink="/">{{ t('site.name') }}</a>
      <span class="separator">/</span>
      <a routerLink="/apps">{{ t('nav.apps') }}</a>
      <span class="separator">/</span>
      <span *ngIf="app">{{ getAppName(app) }}</span>
    </div>

    <header class="app-header" *ngIf="app">
      <div class="app-header-icon" [ngClass]="'tool-icon--' + (app.iconColor || 'app')">
        <app-icon [icon]="app.icon || 'mdi:cellphone'" size="56px"></app-icon>
      </div>
      <div class="app-header-text">
        <h1 class="app-title">{{ getAppName(app) }}</h1>
        <p class="app-subtitle">{{ getAppDescription(app) }}</p>
        <div class="app-tags" *ngIf="getAppTags(app).length">
          <span class="tag" *ngFor="let tag of getAppTags(app)">{{ tag }}</span>
        </div>
      </div>
    </header>

    <div class="app-body">
      <section class="content-section">
        <h2>简介</h2>
        <p>AI视频短剧是基于 AI 生成的视频短剧项目，支持从剧本创作、分镜到成片的一体化制作，适合短视频、竖屏短剧等场景。</p>
        <figure class="figure-block">
          <img src="/assets/apps/09-ai-short-drama/overview.png" alt="AI视频短剧概览" (error)="onImageError($event)" />
          <div class="image-placeholder">
            <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
            <p>此处放置「概览」截图</p>
            <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/09-ai-short-drama/overview.png</code></p>
          </div>
        </figure>
      </section>

      <section class="content-section">
        <h2>功能特性</h2>
        <p>剧本与分镜、AI 画面/语音生成、剪辑与导出等（可根据实际功能补充）。</p>
        <figure class="figure-block">
          <img src="/assets/apps/09-ai-short-drama/features.png" alt="AI视频短剧功能" (error)="onImageError($event)" />
          <div class="image-placeholder">
            <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
            <p>此处放置「功能」截图</p>
            <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/09-ai-short-drama/features.png</code></p>
          </div>
        </figure>
      </section>

      <div class="back-actions">
        <a routerLink="/apps" class="btn btn-secondary">
          {{ t('tool.back.to.list') }}
        </a>
      </div>
    </div>
  </div>
</div>
