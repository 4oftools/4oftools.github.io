<div class="apps-page">
  <div class="apps-bg-decoration" aria-hidden="true"></div>

  <div class="page-header">
    <div class="container">
      <h1 class="page-title">{{ t('apps.title') }}</h1>
      <p class="page-description">{{ t('apps.description') }}</p>
    </div>
  </div>

  <div class="page-content">
    <div class="container">
      <div class="filter-section">
        <div class="filter-controls">
          <div class="filter-tabs">
            <button
              *ngFor="let cat of categories"
              type="button"
              class="filter-tab"
              [class.active]="selectedCategory === cat.value"
              (click)="filterByCategory(cat.value)">
              {{ t(cat.key) }} <span class="count-badge">({{ getCategoryCount(cat.value) }})</span>
            </button>
          </div>
          <div class="search-box">
            <input
              type="text"
              class="search-input"
              [placeholder]="t('search.placeholder.apps')"
              [(ngModel)]="searchQuery"
              (ngModelChange)="onSearchChange()" />
            <span class="search-icon"><app-icon icon="tabler:search" size="1.2em"></app-icon></span>
          </div>
        </div>
      </div>

      <div class="apps-grid">
        <div
          *ngFor="let app of filteredApps; let i = index"
          class="app-card"
          [routerLink]="['/apps', app.id]"
          [style.animation-delay.ms]="getCardStaggerMs(i)">
          <div class="app-featured-badge" *ngIf="app.featured" title="Featured">
            <app-icon icon="mdi:star" size="18px"></app-icon>
          </div>
          <div class="app-card-ribbon app-card-ribbon--oss" *ngIf="app.openSource">{{ t('app.openSource') }}</div>
          <div class="app-card-icon tool-icon-wrap" [ngClass]="'tool-icon--' + (app.iconColor || 'app')">
            <app-icon [icon]="app.icon || 'mdi:cellphone'" size="38px"></app-icon>
          </div>
          <h3 class="app-card-title">{{ getToolName(app) }}</h3>
          <p class="app-card-subtitle" *ngIf="getAppSubtitle(app)">{{ getAppSubtitle(app) }}</p>
          <div class="app-status-badge" *ngIf="app.status">
            <span class="app-status-pill" [ngClass]="getAppStatusClass(app)">
              <span class="app-status-dot"></span>
              {{ getAppStatusLabel(app) }}
            </span>
          </div>
          <p class="app-card-desc">{{ getToolDescription(app) }}</p>
          <div class="app-card-footer" *ngIf="getToolTags(app).length > 0">
            <span *ngFor="let tag of getToolTags(app)" class="app-card-tag">{{ tag }}</span>
          </div>
          <div class="app-card-cta">
            <span class="app-card-link">{{ t('tool.detail') }} →</span>
          </div>
        </div>
      </div>

      <div class="apps-empty" *ngIf="filteredApps.length === 0">
        <p>{{ t('empty.apps') }}</p>
      </div>
    </div>
  </div>
</div>
