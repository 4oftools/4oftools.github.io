<app-app-detail [app]="app" [useAsLayout]="true" *ngIf="app">
  <section class="content-section">
    <h2>简介</h2>
    <p>求签算命是一款求签、解签与简单占卜类应用，支持抽签、解签与趣味占卜，以娱乐为主，仅供休闲参考。</p>
    <figure class="figure-block">
      <img src="/assets/apps/13-fortune-lottery/overview.png" alt="求签算命概览" (error)="onImageError($event)" />
      <div class="image-placeholder">
        <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
        <p>此处放置「概览」截图</p>
        <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/13-fortune-lottery/overview.png</code></p>
      </div>
    </figure>
  </section>
  <section class="content-section">
    <h2>功能特性</h2>
    <p>抽签、解签、简单占卜与运势展示等（可根据实际功能补充）。</p>
    <figure class="figure-block">
      <img src="/assets/apps/13-fortune-lottery/features.png" alt="求签算命功能" (error)="onImageError($event)" />
      <div class="image-placeholder">
        <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
        <p>此处放置「功能」截图</p>
        <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/13-fortune-lottery/features.png</code></p>
      </div>
    </figure>
  </section>
</app-app-detail>
<div class="app-detail app-loading" *ngIf="!app && !error">
  <div class="app-container">
    <p>{{ t('loading') }}</p>
  </div>
</div>
<div class="app-detail app-error" *ngIf="error">
  <div class="app-container">
    <p>{{ t('app.notfound') }}</p>
    <a routerLink="/apps" class="app-btn">{{ t('tool.back.to.list') }}</a>
  </div>
</div>
