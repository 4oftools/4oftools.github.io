<div class="yijun-page">
  <div class="container">
    <div class="breadcrumb">
      <a routerLink="/">{{ t('site.name') }}</a>
      <span class="separator">/</span>
      <a routerLink="/apps">{{ t('nav.apps') }}</a>
      <span class="separator">/</span>
      <span *ngIf="app">{{ getAppName(app) }}</span>
    </div>

    <header class="app-header" *ngIf="app">
      <div class="app-header-icon" [ngClass]="'tool-icon--' + (app.iconColor || 'app')">
        <app-icon [icon]="app.icon || 'mdi:cellphone'" size="56px"></app-icon>
      </div>
      <div class="app-header-text">
        <h1 class="app-title">{{ getAppName(app) }}</h1>
        <p class="app-subtitle">{{ getAppDescription(app) }}</p>
        <div class="app-tags" *ngIf="getAppTags(app).length">
          <span class="tag" *ngFor="let tag of getAppTags(app)">{{ tag }}</span>
        </div>
      </div>
    </header>

    <div class="app-body">
      <section class="content-section">
        <h2>简介</h2>
        <p>忆君是一款与虚拟人聊天的软件，通过 AI 虚拟角色提供陪伴式对话与情感互动，适合倾诉、练习对话或轻松交流。</p>
        <figure class="figure-block">
          <img src="/assets/apps/06-yijun/overview.png" alt="忆君概览" (error)="onImageError($event)" />
          <div class="image-placeholder">
            <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
            <p>此处放置「概览」截图</p>
            <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/06-yijun/overview.png</code></p>
          </div>
        </figure>
      </section>

      <section class="content-section">
        <h2>功能特性</h2>
        <p>虚拟人形象与语音、多轮对话、人设与记忆、主题与场景等（可根据实际功能补充）。</p>
        <figure class="figure-block">
          <img src="/assets/apps/06-yijun/features.png" alt="忆君功能" (error)="onImageError($event)" />
          <div class="image-placeholder">
            <span class="placeholder-icon"><app-icon icon="mdi:image-outline" size="48px"></app-icon></span>
            <p>此处放置「功能」截图</p>
            <p class="placeholder-hint">请将图片放入 <code>src/assets/apps/06-yijun/features.png</code></p>
          </div>
        </figure>
      </section>

      <div class="back-actions">
        <a routerLink="/apps" class="btn btn-secondary">
          {{ t('tool.back.to.list') }}
        </a>
      </div>
    </div>
  </div>
</div>
