<div class="tool-detail" *ngIf="tool">
  <header class="tool-header">
    <div class="tool-container">
      <div class="tool-header-top">
        <div class="tool-breadcrumb">
          <a routerLink="/" class="tool-breadcrumb-link">
            <app-icon icon="mdi:home" size="16px" iconClass="tool-breadcrumb-icon"></app-icon>
            {{ t('site.name') }}
          </a>
          <span class="tool-breadcrumb-separator">›</span>
          <a routerLink="/tools" class="tool-breadcrumb-link">{{ t('nav.tools') }}</a>
          <span class="tool-breadcrumb-separator">›</span>
          <span class="tool-breadcrumb-current">{{ getToolName(tool) }}</span>
        </div>
      </div>
      <div class="tool-header-content">
        <div class="tool-info">
          <div class="tool-icon-large" [ngClass]="'tool-icon--' + (tool.iconColor || 'slate')">
            <app-icon [icon]="tool.icon || 'mdi:wrench'" size="48px" [alt]="getToolName(tool)"></app-icon>
          </div>
          <div class="tool-title-group">
            <h1 class="tool-title">{{ getToolName(tool) }}</h1>
            <p class="tool-subtitle">{{ getToolDescription(tool) }}</p>
            <div class="tool-tags" *ngIf="getToolTags(tool).length > 0">
              <span *ngFor="let tag of getToolTags(tool)" class="tool-tag">{{ tag }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="tool-container">
    <div class="tool-detail-content">
      <div class="tool-detail-body">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
</div>
<div class="tool-detail loading" *ngIf="!tool && !error">
  <div class="tool-container">
    <p>{{ t('loading') }}</p>
  </div>
</div>
<div class="tool-detail error" *ngIf="error">
  <div class="tool-container">
    <p>{{ t('tool.notfound') }}</p>
    <a routerLink="/tools" class="tool-btn">{{ t('tool.back.to.list') }}</a>
  </div>
</div>
