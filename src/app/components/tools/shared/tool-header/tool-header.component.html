<div class="tool-header">
  <div class="container">
    <div class="header-top">
      <div class="breadcrumb">
        <a routerLink="/" class="breadcrumb-link">
          <app-icon icon="mdi:home" size="16px" iconClass="breadcrumb-icon"></app-icon>
          {{ t('site.name') }}
        </a>
        <span class="breadcrumb-separator">›</span>
        <a routerLink="/tools" class="breadcrumb-link">{{ t('nav.tools') }}</a>
        <span class="breadcrumb-separator">›</span>
        <span class="breadcrumb-current">{{ getToolName() }}</span>
      </div>
    </div>
    <div class="header-content">
      <div class="tool-info">
        <div class="tool-icon-large">
          <app-icon [icon]="tool.icon || 'mdi:wrench'" size="48px" [alt]="getToolName()"></app-icon>
        </div>
        <div class="tool-title-group">
          <h1 class="tool-title">{{ getToolName() }}</h1>
          <p class="tool-subtitle">{{ getToolDescription() }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
