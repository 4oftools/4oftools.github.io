<app-tool-detail [tool]="tool" *ngIf="tool">
  <div class="qr-code-generator-content">
  <div class="tool-controls">
    <div class="control-group">
      <label>{{ t('qr.size') }}</label>
      <input
        type="number"
        [(ngModel)]="size"
        min="128"
        max="512"
        step="32"
        class="size-input" />
    </div>
    <div class="button-group">
      <button class="btn btn-primary" (click)="generateQR()" [disabled]="!inputText.trim()">
        {{ t('qr.generate') }}
      </button>
      <button class="btn btn-outline" (click)="clearAll()">
        {{ t('qr.clear') }}
      </button>
    </div>
  </div>

  <div class="qr-container">
    <div class="qr-input-section">
      <div class="section-header">
        <h3>{{ t('qr.input') }}</h3>
        <button class="btn-icon" (click)="copyToClipboard(inputText)" *ngIf="inputText">
          <app-icon icon="mdi:content-copy" size="1em"></app-icon>
          {{ t('qr.copy') }}
        </button>
      </div>
      <textarea
        class="qr-input"
        [(ngModel)]="inputText"
        placeholder="{{ t('qr.input.placeholder') }}"
        rows="6"></textarea>
    </div>

    <div class="qr-output-section">
      <div class="section-header">
        <h3>{{ t('qr.output') }}</h3>
        <button class="btn-icon" (click)="downloadQR()" *ngIf="qrDataUrl">
          <app-icon icon="mdi:download" size="1em"></app-icon>
          {{ t('qr.download') }}
        </button>
      </div>
      <div class="qr-display">
        <img *ngIf="qrDataUrl" [src]="qrDataUrl" [alt]="inputText" class="qr-code" />
        <div *ngIf="!qrDataUrl" class="qr-placeholder">
          <app-icon icon="mdi:qrcode" size="48px"></app-icon>
          <p>{{ t('qr.placeholder') }}</p>
        </div>
      </div>
    </div>
  </div>
  </div>
</app-tool-detail>
