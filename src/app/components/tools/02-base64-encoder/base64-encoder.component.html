<app-tool-detail [tool]="tool" *ngIf="tool">
  <div class="base64-encoder-content">
  <div class="tool-controls">
    <div class="button-group">
      <button class="btn btn-primary" (click)="encodeBase64()">
        {{ t('base64.encode') }}
      </button>
      <button class="btn btn-secondary" (click)="decodeBase64()">
        {{ t('base64.decode') }}
      </button>
      <button class="btn btn-outline" (click)="clearAll()">
        {{ t('base64.clear') }}
      </button>
    </div>
  </div>

  <div class="error-message" *ngIf="errorMessage" [class.error]="errorMessage.startsWith('✗')">
    {{ errorMessage }}
  </div>

  <div class="base64-editor-container">
    <div class="base64-editor-section">
      <div class="section-header">
        <h3>{{ t('base64.input') }}</h3>
        <button class="btn-icon" (click)="copyToClipboard(inputText)" *ngIf="inputText">
          <app-icon icon="mdi:content-copy" size="1em"></app-icon>
          {{ t('base64.copy') }}
        </button>
      </div>
      <textarea
        class="base64-editor"
        [(ngModel)]="inputText"
        placeholder="{{ t('base64.input.placeholder') }}"
        rows="15"></textarea>
    </div>

    <div class="swap-button-container">
      <button class="btn-swap" (click)="swapContent()" title="Swap">
        <app-icon icon="mdi:swap-vertical" size="1.5em"></app-icon>
      </button>
    </div>

    <div class="base64-editor-section">
      <div class="section-header">
        <h3>{{ t('base64.output') }}</h3>
        <button class="btn-icon" (click)="copyToClipboard(outputText)" *ngIf="outputText">
          <app-icon icon="mdi:content-copy" size="1em"></app-icon>
          {{ t('base64.copy') }}
        </button>
      </div>
      <textarea
        class="base64-editor"
        [(ngModel)]="outputText"
        placeholder="{{ t('base64.output.placeholder') }}"
        rows="15"
        readonly></textarea>
    </div>
  </div>
  </div>
</app-tool-detail>
